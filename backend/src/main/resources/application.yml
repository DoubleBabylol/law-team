server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:pms.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: pms-secret-key-for-jwt-token-generation-2024-must-be-at-least-256-bits
  expiration: 7200000
